name: CI

# Runs the framework-free Node test suite on every push and pull request.
# The suite includes test/version-consistency.test.mjs, which enforces the
# release-hygiene invariant the module relies on:
#   module.json version == package.json version == latest CHANGELOG heading
# plus manifest hygiene (download URL tracks the version, repo URLs agree).
# This is the automated guard that complements `npm run version:bump`.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & version consistency
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # No dependencies to install — the project is pure Node ESM with no
      # build step and no runtime deps (see package.json). Run the suite.
      - name: Run test suite
        run: node test/run-all.mjs
